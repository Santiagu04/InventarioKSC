<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InventarioKSC — Panel Auxiliar</title>
    <meta name="description" content="Vista de inventario para auxiliar de InventarioKSC." />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="dashboard">

        <!-- ══ SIDEBAR ═══════════════════════════════════════════ -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>☕ InventarioKSC</h2>
                <span>Panel Auxiliar</span>
            </div>

            <nav class="sidebar-nav" aria-label="Navegación principal">
                <div class="nav-item active" aria-current="page">
                    <span class="nav-icon">📦</span>
                    Inventario
                </div>
                <div class="nav-item disabled" aria-disabled="true" title="Próximamente">
                    <span class="nav-icon">🗓️</span>
                    Eventos
                    <span class="nav-badge-soon">Pronto</span>
                </div>
                <div class="nav-item disabled" aria-disabled="true" title="Próximamente">
                    <span class="nav-icon">🎓</span>
                    Talleres
                    <span class="nav-badge-soon">Pronto</span>
                </div>
            </nav>

            <div class="sidebar-user">
                <div class="sidebar-user-avatar">👤</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarNombre">—</div>
                    <div class="sidebar-user-rol">Auxiliar</div>
                </div>
                <button class="btn-logout" id="btnLogout" title="Cerrar sesión">↩</button>
            </div>
        </aside>

        <!-- ══ CONTENIDO PRINCIPAL ══════════════════════════════ -->
        <main class="main-content">
            <div class="section-header">
                <h1>Inventario</h1>
                <!-- No hay botón "Agregar" para el auxiliar -->
            </div>

            <!-- Solo pestaña "Ver Inventario" visible -->
            <div class="tabs" role="tablist">
                <button class="tab-btn active" role="tab" aria-selected="true">
                    Ver Inventario
                </button>
            </div>

            <!-- Buscador -->
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="search" id="buscador" placeholder="Buscar por nombre o categoría…"
                    aria-label="Buscar productos" />
            </div>

            <!-- Tabla (sin columna Acciones) -->
            <div class="card">
                <div class="table-wrapper">
                    <table id="tablaInventario" aria-label="Consulta de inventario">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Cantidad</th>
                                <th>Unidad</th>
                                <th>Stock mínimo</th>
                                <th>Precio</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyInventario">
                            <tr>
                                <td colspan="7">
                                    <div class="empty-state">
                                        <span style="font-size:2rem">📋</span>
                                        <p>Cargando inventario…</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="table-footer">
                    <span id="totalProductos">Total productos: 0</span>
                    <span>
                        <span class="alert-count" id="enAlerta">En alerta: 0</span>
                    </span>
                </div>
            </div>
        </main>
    </div>

    <!-- ══ MODAL EDICIÓN ════════════════════════════════════════ -->
    <div class="modal-overlay" id="modalEdicion" role="dialog" aria-modal="true" aria-labelledby="modalEdicionTitulo">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalEdicionTitulo">Editar producto</h3>
                <button class="btn-close-modal" id="btnCerrarModal" aria-label="Cerrar">✕</button>
            </div>

            <div id="modalAlert" class="form-alert"></div>

            <form id="editForm" novalidate>
                <input type="hidden" id="editId" />

                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="editNombre">Nombre del producto *</label>
                        <input type="text" id="editNombre" readonly
                            style="background-color: var(--bg-body); cursor: not-allowed;" />
                    </div>

                    <div class="form-group">
                        <label for="editCategoria">Categoría *</label>
                        <select id="editCategoria" disabled
                            style="background-color: var(--bg-body); cursor: not-allowed;">
                            <option value="">Selecciona una categoría</option>
                            <option value="Café">Café</option>
                            <option value="Insumo">Insumo</option>
                            <option value="Material de evento">Material de evento</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="editUnidad">Unidad de medida *</label>
                        <select id="editUnidad" disabled style="background-color: var(--bg-body); cursor: not-allowed;">
                            <option value="">Selecciona una unidad</option>
                            <option value="Unidades">Unidades</option>
                            <option value="Kg">Kg</option>
                            <option value="Gramos">Gramos</option>
                            <option value="Litros">Litros</option>
                            <option value="Paquetes">Paquetes</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="editCantidad">Cantidad disponible *</label>
                        <input type="number" id="editCantidad" min="0" step="0.001" required />
                    </div>

                    <div class="form-group">
                        <label for="editStockMin">Stock mínimo *</label>
                        <input type="number" id="editStockMin" readonly
                            style="background-color: var(--bg-body); cursor: not-allowed;" />
                    </div>

                    <div class="form-group">
                        <label for="editPrecio">Precio *</label>
                        <input type="number" id="editPrecio" readonly
                            style="background-color: var(--bg-body); cursor: not-allowed;" />
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-save">Guardar cambios</button>
                    <button type="button" class="btn-cancel" id="btnCancelarEdit">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast global -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
        /* ── Auxiliar panel — Solo lectura ──────────────────────── */
        const API = '/api';

        // Verificar sesión y rol
        (async () => {
            try {
                const res = await fetch(`${API}/auth/me`);
                const data = await res.json();
                if (!data.ok) { window.location.href = '/'; return; }
                if (data.usuario.rol === 'administrador') {
                    window.location.href = '/inventario.html'; return;
                }
                document.getElementById('sidebarNombre').textContent = data.usuario.nombre;
            } catch (_) { window.location.href = '/'; }
        })();

        // Logout
        document.getElementById('btnLogout').addEventListener('click', async () => {
            await fetch(`${API}/auth/logout`, { method: 'POST' });
            window.location.href = '/';
        });

        // Toast
        function showToast(msg, tipo = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast toast-${tipo} show`;
            setTimeout(() => { t.classList.remove('show'); }, 3000);
        }

        // Formatear precio COP
        function formatPrecio(v) {
            return '$' + Number(v).toLocaleString('es-CO');
        }

        // Color de fila según stock
        function applyRowColor(tr, cantidad, stockMin) {
            const qty = Number(cantidad);
            const min = Number(stockMin);
            tr.classList.remove('row-ok', 'row-low-stock', 'row-critical');
            if (qty === 0) tr.classList.add('row-critical');
            else if (qty <= min) tr.classList.add('row-low-stock');
            else tr.classList.add('row-ok');
        }

        // Estado de alerta
        function updateFooter(productos) {
            const total = productos.length;
            const alerta = productos.filter(p => Number(p.cantidad) <= Number(p.stock_minimo)).length;
            document.getElementById('totalProductos').textContent = `Total productos: ${total}`;
            document.getElementById('enAlerta').textContent = `En alerta: ${alerta}`;
        }

        // Renderizar tabla (sin acciones)
        let productosGlobal = [];
        function renderTabla(lista) {
            const tbody = document.getElementById('tbodyInventario');
            if (!lista.length) {
                tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><span style="font-size:2rem">📭</span><p>No hay productos en el inventario.</p></div></td></tr>`;
                return;
            }
            tbody.innerHTML = lista.map(p => `
      <tr data-id="${p.id}" data-qty="${p.cantidad}" data-min="${p.stock_minimo}">
        <td>${p.nombre}</td>
        <td>${p.categoria}</td>
        <td>${Number(p.cantidad).toLocaleString('es-CO')}</td>
        <td>${p.unidad_medida}</td>
        <td>${Number(p.stock_minimo).toLocaleString('es-CO')}</td>
        <td class="col-precio">${formatPrecio(p.precio)}</td>
        <td>
           <button class="btn-action btn-edit" data-id="${p.id}" title="Editar">Editar</button>
        </td>
      </tr>
    `).join('');

            // Aplicar colores de fila
            lista.forEach(p => {
                const tr = tbody.querySelector(`tr[data-id="${p.id}"]`);
                if (tr) applyRowColor(tr, p.cantidad, p.stock_minimo);
            });

            updateFooter(lista);

            // Listeners para botones de editar
            tbody.querySelectorAll('.btn-edit').forEach(btn =>
                btn.addEventListener('click', () => abrirModalEdicion(Number(btn.dataset.id)))
            );
        }

        // Filtrar
        document.getElementById('buscador').addEventListener('input', function () {
            const q = this.value.toLowerCase().trim();
            const filtrados = productosGlobal.filter(p =>
                p.nombre.toLowerCase().includes(q) || p.categoria.toLowerCase().includes(q)
            );
            renderTabla(filtrados);
        });

        // Cargar inventario
        async function loadInventario() {
            try {
                const res = await fetch(`${API}/inventario`);
                const data = await res.json();
                if (!data.ok) throw new Error();
                productosGlobal = data.data;
                renderTabla(productosGlobal);
            } catch (_) {
                showToast('No se pudo cargar el inventario', 'error');
            }
        }

        /* ── Lógica de edición ── */
        function abrirModal(id) {
            document.getElementById(id).classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function cerrarModal(id) {
            document.getElementById(id).classList.remove('open');
            document.body.style.overflow = '';
        }

        document.getElementById('btnCerrarModal').addEventListener('click', () => cerrarModal('modalEdicion'));
        document.getElementById('btnCancelarEdit').addEventListener('click', () => cerrarModal('modalEdicion'));

        document.getElementById('modalEdicion').addEventListener('click', (e) => {
            if (e.target.id === 'modalEdicion') cerrarModal('modalEdicion');
        });

        function showFormAlert(id, msg, tipo = 'error') {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = `form-alert ${tipo} visible`;
        }
        function hideFormAlert(id) {
            const el = document.getElementById(id);
            el.textContent = '';
            el.className = 'form-alert';
        }

        function abrirModalEdicion(id) {
            const producto = productosGlobal.find(p => p.id === id);
            if (!producto) return;

            document.getElementById('editId').value = producto.id;
            document.getElementById('editNombre').value = producto.nombre;
            document.getElementById('editCategoria').value = producto.categoria;
            document.getElementById('editUnidad').value = producto.unidad_medida;
            document.getElementById('editCantidad').value = producto.cantidad;
            document.getElementById('editStockMin').value = producto.stock_minimo;
            document.getElementById('editPrecio').value = producto.precio;
            hideFormAlert('modalAlert');

            abrirModal('modalEdicion');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideFormAlert('modalAlert');

            const id = document.getElementById('editId').value;
            const payload = {
                nombre: document.getElementById('editNombre').value.trim(),
                categoria: document.getElementById('editCategoria').value,
                cantidad: document.getElementById('editCantidad').value,
                unidad_medida: document.getElementById('editUnidad').value,
                stock_minimo: document.getElementById('editStockMin').value,
                precio: document.getElementById('editPrecio').value,
            };

            const btn = e.submitter;
            if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }

            try {
                const res = await fetch(`${API}/inventario/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();

                if (!data.ok) {
                    showFormAlert('modalAlert', data.mensaje || 'Error al actualizar');
                    return;
                }

                cerrarModal('modalEdicion');
                await loadInventario();
                showToast('Producto actualizado correctamente');
            } catch (_) {
                showFormAlert('modalAlert', 'Error de conexión. Intenta de nuevo.');
            } finally {
                if (btn) { btn.disabled = false; btn.textContent = 'Guardar cambios'; }
            }
        });

        loadInventario();
    </script>
</body>

</html>
